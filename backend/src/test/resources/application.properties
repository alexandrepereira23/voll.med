# Sobrescreve datasource para H2 em memória (sem Flyway)
spring.config.import=
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# JWT secret — obrigatório, sem default na config principal
api.security.token.secret=testSecretKeyForTestingPurposesAtLeast32Chars

admin.login=admin@vollmed.com
admin.password=
anthropic.api.key=

springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
