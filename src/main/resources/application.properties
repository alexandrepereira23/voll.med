spring.application.name=api
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:vollmed_api}?tinyInt1isBit=false
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=TINYINT
server.error.include-stacktrace=never


api.security.token.secret=${JWT_SECRET}
api.security.token.expiracao-horas=${TOKEN_EXPIRACAO_HORAS:2}

admin.login=${ADMIN_LOGIN:admin@vollmed.com}
admin.password=${ADMIN_PASSWORD:}

# Swagger: habilitar apenas em desenvolvimento (false em producao)
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# IA — Anthropic Claude API
anthropic.api.key=${ANTHROPIC_API_KEY:}